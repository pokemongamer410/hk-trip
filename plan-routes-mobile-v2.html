<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇭🇰 踢批哀香港行 — 三套方案路線圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --day1: #10b981;
            --day1-bg: #10b98120;
            --day2: #f59e0b;
            --day2-bg: #f59e0b20;
            --day3: #ef4444;
            --day3-bg: #ef444420;
            --fixed: #6366f1;
            --fixed-bg: #6366f120;
            --bg: #0f1117;
            --card: #1a1d27;
            --card-hover: #222531;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --text-dim: #9ca3af;
            --accent: #818cf8;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #1e1b4b 0%, #0f1117 100%);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 1000;
        }

        header h1 {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .plan-switcher {
            display: flex;
            gap: 6px;
        }

        .plan-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .plan-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .plan-btn.active-main {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
            border-color: #7c3aed;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 440px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .plan-desc {
            padding: 12px;
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            line-height: 1.6;
            color: #c7d2fe;
            flex-shrink: 0;
        }

        .plan-desc strong {
            color: #e0e7ff;
            font-size: 13px;
        }

        .plan-desc .plan-subtitle {
            color: #a5b4fc;
            font-size: 11px;
            margin-top: 2px;
        }

        .day-tabs {
            display: flex;
            padding: 8px 12px 0;
            gap: 4px;
            flex-shrink: 0;
        }

        .day-tab {
            flex: 1;
            padding: 7px 6px;
            text-align: center;
            border-radius: 8px 8px 0 0;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            border-bottom: none;
            background: transparent;
            color: var(--text-dim);
        }

        .day-tab:hover {
            background: var(--card-hover);
        }

        .day-tab.active-day1 {
            background: var(--day1-bg);
            color: var(--day1);
            border-color: var(--day1);
        }

        .day-tab.active-day2 {
            background: var(--day2-bg);
            color: var(--day2);
            border-color: var(--day2);
        }

        .day-tab.active-day3 {
            background: var(--day3-bg);
            color: var(--day3);
            border-color: var(--day3);
        }

        .day-tab.active-all {
            background: var(--fixed-bg);
            color: var(--accent);
            border-color: var(--accent);
        }

        .spot-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .spot-list::-webkit-scrollbar {
            width: 5px;
        }

        .spot-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .spot-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .spot-card {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .spot-card:hover {
            border-color: var(--accent);
            background: var(--card-hover);
            transform: translateX(3px);
        }

        .spot-card.highlighted {
            border-color: var(--accent);
            background: #818cf820;
            box-shadow: 0 0 12px #818cf830;
        }

        .spot-card .spot-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .spot-card .spot-meta {
            font-size: 10px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .spot-card .spot-time {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            background: #6366f120;
            color: #818cf8;
            margin-right: 4px;
        }

        .spot-card .spot-zone-label {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 500;
            background: #818cf810;
            color: #a5b4fc;
            margin-left: 2px;
        }

        .spot-tag {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            margin-top: 3px;
            margin-right: 2px;
        }

        .tag-food {
            background: #f59e0b20;
            color: #f59e0b;
        }

        .tag-sight {
            background: #3b82f620;
            color: #3b82f6;
        }

        .tag-shop {
            background: #ec489920;
            color: #ec4899;
        }

        .tag-transport {
            background: #6366f120;
            color: #6366f1;
        }

        .tag-hotel {
            background: #8b5cf620;
            color: #8b5cf6;
        }

        .tag-bar {
            background: #f4364520;
            color: #f43645;
        }

        .spot-warn {
            background: #ef444415;
            color: #fca5a5;
            padding: 3px 6px;
            border-radius: 4px;
            margin-top: 3px;
            font-size: 10px;
            line-height: 1.4;
            border-left: 2px solid #ef4444;
        }

        #map {
            flex: 1;
            z-index: 1;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            z-index: 999;
            font-size: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .legend h3 {
            font-size: 11px;
            margin-bottom: 5px;
            color: var(--accent);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 2px;
            color: var(--text-dim);
        }

        .legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .custom-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #fff;
            font-weight: 700;
            font-size: 11px;
            font-family: 'Inter', sans-serif;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            text-align: center;
            line-height: 1;
        }

        .leaflet-popup-content-wrapper {
            background: var(--card) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important;
        }

        .leaflet-popup-tip {
            background: var(--card) !important;
        }

        .leaflet-popup-content {
            font-family: 'Inter', 'Noto Sans TC', sans-serif !important;
            font-size: 12px !important;
            line-height: 1.6 !important;
            margin: 10px 12px !important;
        }

        .leaflet-popup-content h3 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 3px;
            color: var(--accent);
        }

        .leaflet-popup-content .popup-meta {
            color: var(--text-dim);
            font-size: 11px;
        }

        .leaflet-popup-content .popup-warn {
            background: #ef444420;
            color: #fca5a5;
            padding: 4px 7px;
            border-radius: 5px;
            margin-top: 5px;
            font-size: 10px;
            border-left: 2px solid #ef4444;
        }

        .leaflet-popup-close-button {
            color: var(--text-dim) !important;
        }

        .stats-bar {
            display: flex;
            gap: 12px;
            padding: 6px 12px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .stats-bar span {
            font-weight: 600;
            color: var(--text);
        }


        /* ===== Mobile toggle (hidden on desktop) ===== */
        .mobile-nav {
            display: none;
        }

        @media (max-width: 768px) {

            body {
                overflow: auto;
                height: auto;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                padding: 16px;
                position: sticky;
                top: 0;
            }

            header h1 {
                font-size: 18px;
            }

            header p {
                font-size: 13px;
            }

            .plan-switcher {
                width: 100%;
                display: flex;
                gap: 8px;
            }

            .plan-btn {
                flex: 1;
                font-size: 14px;
                padding: 12px 8px;
                border-radius: 10px;
                min-height: 44px;
            }

            .main-container {
                flex-direction: column;
                overflow: visible;
            }

            /* Reading area first */
            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                overflow: visible;
            }

            .spot-list {
                padding: 16px;
                overflow: visible;
            }

            .plan-desc {
                font-size: 14px;
                padding: 16px;
                line-height: 1.75;
            }

            .plan-desc strong {
                font-size: 16px;
            }

            .day-tabs {
                padding: 12px 16px 0;
                gap: 8px;
            }

            .day-tab {
                font-size: 14px;
                padding: 10px 8px;
                border-radius: 12px 12px 0 0;
                min-height: 40px;
            }



            .spot-card {
                padding: 16px;
                margin-bottom: 12px;
                border-radius: 14px;
            }

            .spot-card:hover {
                transform: none;
            }

            .spot-card .spot-name {
                font-size: 16px;
                margin-bottom: 6px;
            }

            .spot-card .spot-meta {
                font-size: 14px;
                line-height: 1.6;
            }

            .spot-card .spot-time {
                font-size: 13px;
                padding: 4px 8px;
            }

            .spot-tag {
                font-size: 12px;
                padding: 4px 8px;
                margin-top: 8px;
                border-radius: 8px;
            }

            .spot-warn {
                font-size: 13px;
                padding: 8px 10px;
                margin-top: 8px;
            }

            .stats-bar {
                font-size: 14px;
                padding: 14px 16px 70px;
                /* leave space for mobile nav */
            }

            /* Map: default hidden on mobile, toggled by nav */
            #map {
                display: none;
                flex: none;
                width: 100%;
                height: calc(100vh - 160px);
            }

            .legend {
                display: none;
            }

            /* ===== Mobile bottom nav ===== */
            .mobile-nav {
                display: flex;
                position: fixed;
                left: 12px;
                right: 12px;
                bottom: 12px;
                background: rgba(26, 29, 39, 0.92);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 8px;
                gap: 8px;
                z-index: 2000;
                backdrop-filter: blur(10px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            }

            .mobile-nav button {
                flex: 1;
                border: 1px solid var(--border);
                background: var(--card);
                color: var(--text);
                font-size: 14px;
                font-weight: 800;
                border-radius: 12px;
                padding: 12px 10px;
                cursor: pointer;
                min-height: 44px;
                font-family: inherit;
            }

            .mobile-nav button.active {
                border-color: var(--accent);
                background: linear-gradient(135deg, #4f46e5, #7c3aed);
                color: #fff;
            }

            /* ===== When user chooses map view ===== */
            body.mobile-show-map .sidebar {
                display: none;
            }

            body.mobile-show-map #map {
                display: block;
            }
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>🇭🇰 踢批哀香港行 — 方案路線圖</h1>
            <p>切換方案看不同路線｜點地點看詳情｜03/11-13｜10人</p>
        </div>
        <div class="plan-switcher">
            <button class="plan-btn active-main" onclick="switchPlan('main')" id="btn-main">⭐ 完整行程 (混搭法)</button>
            <button class="plan-btn" onclick="switchPlan('s')" id="btn-s"
                style="background:#1f2937; color:#fff; border-color:#4b5563;">📍 分區備案 (Julia & Angela)</button>
        </div>
    </header>
    <div class="main-container">
        <div class="sidebar">
            <div class="plan-desc" id="planDesc"></div>
            <div class="day-tabs" id="dayTabsContainer">
                <div class="day-tab active-all" onclick="filterDay('all')" id="tab-all">全部</div>
                <div class="day-tab" onclick="filterDay(1)" id="tab-1">Day 1</div>
                <div class="day-tab" onclick="filterDay(2)" id="tab-2">Day 2</div>
                <div class="day-tab" onclick="filterDay(3)" id="tab-3">Day 3</div>
            </div>
            <!-- Plan S Area Tabs (Hidden by default) -->
            <div class="day-tabs" id="areaTabsContainer"
                style="display: none; overflow-x: auto; white-space: nowrap; justify-content: flex-start; gap: 4px;">
                <div class="day-tab active-all" onclick="filterDay('all')" id="tab-all-s">全部區域</div>
                <div class="day-tab" onclick="filterDay('central')" id="tab-central">中環/半山</div>
                <div class="day-tab" onclick="filterDay('sheungwan')" id="tab-sheungwan">上環/西環</div>
                <div class="day-tab" onclick="filterDay('cwb')" id="tab-cwb">灣仔/銅鑼灣</div>
                <div class="day-tab" onclick="filterDay('tst')" id="tab-tst">尖沙咀/佐敦</div>
                <div class="day-tab" onclick="filterDay('mongkok')" id="tab-mongkok">旺角/深水埗</div>
                <div class="day-tab" onclick="filterDay('other')" id="tab-other">其他區/待探索</div>
            </div>
            <div class="spot-list" id="spotList"></div>
            <div class="stats-bar" id="statsBar"></div>
        </div>
        <div id="map"></div>
    </div>
    <div class="legend">
        <h3>圖例</h3>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--day1)"></div> Day 1（03/11 三）
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--day2)"></div> Day 2（03/12 四）
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--day3)"></div> Day 3（03/13 五）
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:var(--fixed)"></div> 固定/交通
        </div>
        <div class="legend-item" style="margin-top:4px;border-top:1px solid var(--border);padding-top:4px;">
            <div style="width:20px;height:2px;background:var(--text-dim);border-top:2px dashed var(--text-dim);"></div>
            建議路線
        </div>
    </div>


    <div class="mobile-nav" aria-label="mobile navigation">
        <button id="mobileBtnList" class="active" type="button">📋 清單</button>
        <button id="mobileBtnMap" type="button">🗺️ 地圖</button>
    </div>

    <script>
        // ===== 所有地點資料庫 =====
        const allSpots = {
            "airport": { name: "香港國際機場", searchName: "Hong Kong International Airport", lat: 22.3080, lng: 113.9185, type: "transport", area: "機場", note: "去程 10:30 抵達 / 回程 15:35 前到" },

            "kamroast": { name: "甘牌燒鵝", searchName: "Kam's Roast Goose Wan Chai Hong Kong", lat: 22.2748, lng: 114.1722, type: "food", area: "灣仔", note: "👩Angela提到｜飯店旁邊！", warn: "✅ 11:30-21:30 每日營業" },

            "lankwaifong": { name: "蘭桂坊", searchName: "Lan Kwai Fong Hong Kong", lat: 22.2808, lng: 114.1553, type: "bar", area: "中環", note: "👩Angela＋👧Lucy推薦", warn: "體會夜生活氛圍" },
            "ironfairies": { name: "The Iron Fairies", searchName: "The Iron Fairies Hong Kong", lat: 22.2840, lng: 114.1503, type: "bar", area: "中環", note: "👩Angela 3/2推薦｜live band 推薦店", warn: "🚨 21:30 後才有 live band" },
            "lanfongyuen": { name: "蘭芳園", searchName: "Lan Fong Yuen Hong Kong Central", lat: 22.2819, lng: 114.1550, type: "food", area: "中環", note: "👩Angela＋🧑Frunky推薦｜絲襪奶茶始祖", warn: "✅ 07:30-18:00 (週日公休)" },
            "singheung": { name: "勝香園", searchName: "Sing Heung Yuen Hong Kong", lat: 22.2843, lng: 114.1524, type: "food", area: "中環", note: "👩Angela推薦｜蛋牛治+奶茶", warn: "✅ 08:00-15:30（週日公休）" },
            "vission": { name: "Vission Bakery", searchName: "Vission Bakery Hong Kong", lat: 22.2822, lng: 114.1533, type: "food", area: "中環", note: "👩推薦/👧不推（$60太貴）", warn: "兩派意見" },

                        { id: "vissionnine", time: "推薦", zone: "咖啡甜點" }, { id: "lanticogelato", time: "推薦", zone: "冰淇淋" }, { id: "messina", time: "推薦", zone: "冰淇淋" }, { id: "bagelsalley", time: "推薦", zone: "咖啡甜點" },
                        { id: "dabanlou", time: "推薦", zone: "餐廳正餐" }, { id: "yungkee", time: "推薦", zone: "餐廳正餐" }, { id: "lukyu", time: "推薦", zone: "餐廳正餐" }, { id: "kaukee", time: "推薦", zone: "餐廳正餐" }, { id: "stanley", time: "推薦", zone: "餐廳正餐" }

                        { id: "ganto_mk", time: "推薦", zone: "冰淇淋" },
                        { id: "kamwah", time: "推薦", zone: "餐廳正餐" }, { id: "mingcourt_mk", time: "推薦", zone: "餐廳正餐" }, { id: "oimansang", time: "推薦", zone: "餐廳正餐" }, { id: "manfat", time: "推薦", zone: "大排檔" }, { id: "chungyung", time: "推薦", zone: "餐廳正餐" }, { id: "lausumkee", time: "推薦", zone: "餐廳正餐" }
                    ],
                    other: [
                        { id: "airside", time: "推薦", zone: "啟德購物" }, { id: "duckshing", time: "推薦", zone: "北角伴手禮" },
                        { id: "tungpo", time: "推薦", zone: "北角大排檔" }, { id: "lungo", time: "推薦", zone: "九龍灣咖啡" }, { id: "kamfanktk", time: "推薦", zone: "牛頭角餐廳" },
                        { id: "fongwingkee", time: "推薦", zone: "Angela 推薦" }
                    ]
                }
            }
        };

        // ===== 顏色/類型 =====
        const dayColors = { 1: '#10b981', 2: '#f59e0b', 3: '#ef4444' };
        const typeLabels = { food: '🍽️ 美食', sight: '📸 景點', shop: '🛍️ 購物', transport: '🚇 交通', hotel: '🏨 住宿', bar: '🍸 酒吧' };
        const typeTagClass = { food: 'tag-food', sight: 'tag-sight', shop: 'tag-shop', transport: 'tag-transport', hotel: 'tag-hotel', bar: 'tag-bar' };

        // ===== 地圖 =====
        const map = L.map('map', { zoomControl: true }).setView([22.2850, 114.1580], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19,
        }).addTo(map);

        let markers = [];
        let routeLines = [];
        let currentPlan = 'main';
        let currentDay = 'all';

        function clearMap() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            routeLines.forEach(l => map.removeLayer(l));
            routeLines = [];
        }

        function renderPlan(planKey, dayFilter) {
            clearMap();
            const plan = plans[planKey];
            const descEl = document.getElementById('planDesc');
            descEl.innerHTML = `<strong>${plan.name}</strong><div class="plan-subtitle">${plan.subtitle}</div><div style="margin-top:4px;">${plan.desc}</div>`;

            const listEl = document.getElementById('spotList');
            let html = '';

            // 定義 Plan S 的顯示名稱與顏色 (可以比較繽紛)
            const areaNames = {
                'central': '🏢 中環/金鐘/半山', 'sheungwan': '🚋 上環/西營盤', 'cwb': '🛍️ 灣仔/銅鑼灣/天后',
                'tst': '✨ 尖沙咀/佐敦', 'mongkok': '👟 旺角/太子/深水埗', 'other': '📍 其他區/待探索'
            };
            const areaColors = {
                'central': '#a855f7', 'sheungwan': '#ec4899', 'cwb': '#eab308',
                'tst': '#3b82f6', 'mongkok': '#14b8a6', 'other': '#64748b'
            };

            const dayNames = { 1: '🟢 Day 1（03/11 三）', 2: '🟡 Day 2（03/12 四）', 3: '🔴 Day 3（03/13 五）' };
            let totalSpots = 0;
            let foodCount = 0, sightCount = 0, shopCount = 0;

            // 判斷要跑訪的是數字天數 (A/B) 還是地區字串 (S)
            const loopKeys = planKey === 's' ? Object.keys(areaNames) : [1, 2, 3];

            loopKeys.forEach(d => {
                if (dayFilter !== 'all' && dayFilter !== d) return;
                const dayStops = plan.days[d];
                if (!dayStops) return;

                const displayName = planKey === 's' ? areaNames[d] : dayNames[d];
                const displayColor = planKey === 's' ? areaColors[d] : dayColors[d];

                html += `<div style="font-size:12px;font-weight:700;color:${displayColor};margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid ${displayColor}40;">${displayName}（${dayStops.length} 站）</div>`;

                const routeCoords = [];

                dayStops.forEach((stop, idx) => {
                    const spot = allSpots[stop.id];
                    if (!spot) return;
                    totalSpots++;
                    if (spot.type === 'food') foodCount++;
                    if (spot.type === 'sight') sightCount++;
                    if (spot.type === 'shop') shopCount++;

                    const color = planKey === 's' ? areaColors[d] : dayColors[d];
                    const size = 24;
                    const icon = L.divIcon({
                        className: '',
                        html: `<div class="custom-marker" style="width:${size}px;height:${size}px;background:${color};">${idx + 1}</div>`,
                        iconSize: [size, size], iconAnchor: [size / 2, size / 2],
                    });

                    const googleMapsUrl = spot.url ? spot.url : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(spot.searchName)}`;
                    const marker = L.marker([spot.lat, spot.lng], { icon }).addTo(map);
                    marker.on('click', () => {
                        marker.unbindPopup().bindPopup(L.popup({ maxWidth: 300 }).setContent(`
          <h3>${spot.name}</h3>
          <div class="popup-meta">
            <strong>${planKey === 's' ? areaNames[d] : `Day ${d}`} #${idx + 1}</strong>（${stop.time}）｜ ${typeLabels[spot.type]} ｜ 📍 ${spot.area}<br>
            ${spot.note ? `📝 ${spot.note}` : ''}
          </div>
          ${spot.warn ? `<div class="popup-warn">${spot.warn}</div>` : ''}
          <div style="margin-top:6px;"><a href="${googleMapsUrl}" target="_blank" style="color:#818cf8;text-decoration:underline;font-size:11px;">📍 Google Maps 確認</a></div>
        `)).openPopup();
                        highlightCard(`${planKey}-${d}-${idx}`);
                    });
                    markers.push(marker);
                    routeCoords.push([spot.lat, spot.lng]);

                    html += `
        <div class="spot-card" id="card-${planKey}-${d}-${idx}" onclick="flyTo(${spot.lat},${spot.lng},${markers.length - 1})">
          <div class="spot-name"><span class="spot-time">${stop.time}</span> ${spot.name}</div>
          ${stop.zone ? `<div class="spot-meta" style="margin-bottom:2px;"><span class="spot-zone-label">🗂️ ${stop.zone}</span></div>` : ''}
          <div class="spot-meta">📍 ${spot.area} ${spot.note ? `<br>📝 ${spot.note}` : ''}</div>
          ${spot.warn ? `<div class="spot-warn">${spot.warn}</div>` : ''}
          <span class="spot-tag ${typeTagClass[spot.type]}">${typeLabels[spot.type]}</span>
        </div>`;
                });

                // 畫路線 (如果在 Plan S 就不畫路線，因為只是清單)
                if (planKey !== 's' && routeCoords.length >= 2) {
                    routeLines.push(L.polyline(routeCoords, {
                        color: displayColor, weight: 3, opacity: 0.6, dashArray: '8 6'
                    }).addTo(map));
                }
            });

            listEl.innerHTML = html;
            document.getElementById('statsBar').innerHTML = `共 <span>${totalSpots}</span> 站 ｜ 🍽️ <span>${foodCount}</span> ｜ 📸 <span>${sightCount}</span> ｜ 🛍️ <span>${shopCount}</span>`;

            // 調整視野
            if (markers.length > 0) {
                const bounds = L.latLngBounds(markers.map(m => m.getLatLng()));
                map.fitBounds(bounds.pad(0.15));
            }
        }

        function flyTo(lat, lng, markerIdx) {
            map.flyTo([lat, lng], 16, { duration: 0.8 });
            if (markers[markerIdx]) markers[markerIdx].fire('click');
        }

        function highlightCard(id) {
            document.querySelectorAll('.spot-card').forEach(c => c.classList.remove('highlighted'));
            const card = document.getElementById(`card-${id}`);
            if (card) { card.classList.add('highlighted'); card.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }

        function switchPlan(key) {
            currentPlan = key;
            currentDay = 'all';
            document.querySelectorAll('.plan-btn').forEach(b => b.className = 'plan-btn');
            const newBtn = document.getElementById(`btn-${key}`);
            newBtn.className = 'plan-btn active-' + key;
            if (key === 's') newBtn.style.cssText = 'background: #f59e0b; color: #fff; border-color: #f59e0b;';

            // Toggle Tab Visibility based on Plan
            if (key === 's') {
                document.getElementById('dayTabsContainer').style.display = 'none';
                document.getElementById('areaTabsContainer').style.display = 'flex';
                document.querySelectorAll('#areaTabsContainer .day-tab').forEach(t => t.className = 'day-tab');
                document.getElementById('tab-all-s').classList.add('active-all');
            } else {
                document.getElementById('dayTabsContainer').style.display = 'flex';
                document.getElementById('areaTabsContainer').style.display = 'none';
                document.querySelectorAll('#dayTabsContainer .day-tab').forEach(t => t.className = 'day-tab');
                document.getElementById('tab-all').classList.add('active-all');
                document.getElementById('btn-s').style.cssText = 'background:#1f2937; color:#fff; border-color:#4b5563;';
            }

            renderPlan(key, 'all');
        }

        function filterDay(day) {
            currentDay = day;

            const isAreaTab = isNaN(day) && day !== 'all';
            const containerId = currentPlan === 's' ? 'areaTabsContainer' : 'dayTabsContainer';

            document.querySelectorAll(`#${containerId} .day-tab`).forEach(t => t.className = 'day-tab');

            if (day === 'all') {
                document.getElementById(currentPlan === 's' ? 'tab-all-s' : 'tab-all').classList.add('active-all');
            } else {
                const targetTab = document.getElementById(`tab-${day}`);
                if (targetTab) {
                    targetTab.className = 'day-tab active-day' + (isAreaTab ? 's' : day);
                }
            }
            renderPlan(currentPlan, day);
        }


        // ===== 手機：清單/地圖切換（不影響桌機）=====
        function isMobile() {
            return window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
        }

        function setMobileView(view) {
            if (!isMobile()) return;

            const showMap = (view === 'map');
            document.body.classList.toggle('mobile-show-map', showMap);

            const btnList = document.getElementById('mobileBtnList');
            const btnMap = document.getElementById('mobileBtnMap');
            if (btnList && btnMap) {
                btnList.classList.toggle('active', !showMap);
                btnMap.classList.toggle('active', showMap);
            }

            // Leaflet map needs to recalc size when becoming visible
            if (showMap) {
                setTimeout(() => {
                    try {
                        map.invalidateSize();
                        if (markers.length > 0) {
                            const bounds = L.latLngBounds(markers.map(m => m.getLatLng()));
                            map.fitBounds(bounds.pad(0.15));
                        }
                    } catch (e) { }
                }, 180);
            }
        }

        function wireMobileNav() {
            const btnList = document.getElementById('mobileBtnList');
            const btnMap = document.getElementById('mobileBtnMap');
            if (!btnList || !btnMap) return;

            btnList.addEventListener('click', () => setMobileView('list'));
            btnMap.addEventListener('click', () => setMobileView('map'));

            // default view on mobile: list
            setMobileView('list');

            // If user rotates / resizes, keep state sensible
            window.addEventListener('resize', () => {
                if (!isMobile()) {
                    document.body.classList.remove('mobile-show-map');
                } else {
                    // keep buttons in sync
                    const showMap = document.body.classList.contains('mobile-show-map');
                    setMobileView(showMap ? 'map' : 'list');
                }
            }, { passive: true });
        }


        // 初始渲染
        renderPlan('main', 'all');
        wireMobileNav();
    </script>
